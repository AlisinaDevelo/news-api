openapi: 3.0.3
info:
  title: news-api
  description: |
    REST API backed by the GNews search endpoint.
    When `CLIENT_API_KEYS` is set on the server, send a matching `X-API-Key` header on `/api/*` requests.
  version: 1.2.0
  license:
    name: MIT
    url: https://opensource.org/license/mit
servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /health:
    get:
      summary: Liveness probe
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Process is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      summary: Readiness probe
      description: Returns 503 when `GNEWS_API_KEY` is not configured (non-test environments).
      operationId: getReady
      security: []
      responses:
        "200":
          description: Ready to serve traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Not ready (e.g. missing API key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotReadyResponse"

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: getMetrics
      security: []
      responses:
        "200":
          description: Prometheus text / OpenMetrics exposition format
          content:
            text/plain:
              schema:
                type: string

  /openapi.yaml:
    get:
      summary: OpenAPI contract
      operationId: getOpenApiYaml
      security: []
      responses:
        "200":
          description: OpenAPI 3 document
          content:
            application/yaml:
              schema:
                type: string

  /api/articles:
    get:
      summary: Search articles
      operationId: searchArticles
      security:
        - ApiKeyAuth: []
        - {}
      parameters:
        - name: X-API-Key
          in: header
          required: false
          schema:
            type: string
          description: Required when the server sets CLIENT_API_KEYS.
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: lang
          in: query
          required: false
          schema:
            type: string
            pattern: "^[a-zA-Z]{2}$"
          description: Two-letter article language code.
        - name: country
          in: query
          required: false
          schema:
            type: string
            pattern: "^[a-zA-Z]{2}$"
          description: Two-letter source country code.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Include articles published at or after this ISO 8601 timestamp.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Include articles published at or before this ISO 8601 timestamp.
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [publishedAt, relevance]
          description: Provider sort order. Forwarded to GNews as `sortby`.
      responses:
        "200":
          description: Article list from provider (possibly cached)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Rate limit exceeded
        "502":
          $ref: "#/components/responses/BadGateway"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/articles/title/{title}:
    get:
      summary: Find article by exact title
      operationId: getArticleByTitle
      security:
        - ApiKeyAuth: []
        - {}
      parameters:
        - name: X-API-Key
          in: header
          required: false
          schema:
            type: string
          description: Required when the server sets CLIENT_API_KEYS.
        - name: title
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No article with that title in the search window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Rate limit exceeded
        "502":
          $ref: "#/components/responses/BadGateway"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/articles/source:
    get:
      summary: Filter articles by news source name
      operationId: listArticlesBySource
      security:
        - ApiKeyAuth: []
        - {}
      parameters:
        - name: X-API-Key
          in: header
          required: false
          schema:
            type: string
          description: Required when the server sets CLIENT_API_KEYS.
        - name: source
          in: query
          required: true
          schema:
            type: string
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: lang
          in: query
          required: false
          schema:
            type: string
            pattern: "^[a-zA-Z]{2}$"
          description: Two-letter article language code.
        - name: country
          in: query
          required: false
          schema:
            type: string
            pattern: "^[a-zA-Z]{2}$"
          description: Two-letter source country code.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Include articles published at or after this ISO 8601 timestamp.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Include articles published at or before this ISO 8601 timestamp.
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [publishedAt, relevance]
          description: Provider sort order. Forwarded to GNews as `sortby`.
      responses:
        "200":
          description: Articles whose source name matches (case-insensitive)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Rate limit exceeded
        "502":
          $ref: "#/components/responses/BadGateway"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Required for `/api/*` requests only when the server sets `CLIENT_API_KEYS`.

  responses:
    Unauthorized:
      description: Missing or invalid X-API-Key when CLIENT_API_KEYS is configured
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    BadRequest:
      description: Invalid or missing parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    BadGateway:
      description: Upstream provider error or invalid provider payload
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

  schemas:
    ErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      required: [status, uptime]
      properties:
        status:
          type: string
          example: ok
        uptime:
          type: number
          format: double

    ReadyResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ready

    NotReadyResponse:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          example: not_ready
        reason:
          type: string
          example: missing_api_key

    ArticleSource:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
        url:
          type: string

    Article:
      type: object
      required: [title, url, publishedAt, source]
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        content:
          type: string
          nullable: true
        url:
          type: string
        image:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
        source:
          $ref: "#/components/schemas/ArticleSource"
