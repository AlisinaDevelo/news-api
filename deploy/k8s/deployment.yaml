apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-api
  labels:
    app: news-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: news-api
  template:
    metadata:
      labels:
        app: news-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: news-api
          image: news-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: TRUST_PROXY
              value: "1"
            - name: GNEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: news-api-secrets
                  key: gnews-api-key
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: news-api-secrets
                  key: redis-url
                  optional: true
            - name: CLIENT_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: news-api-secrets
                  key: client-api-keys
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
