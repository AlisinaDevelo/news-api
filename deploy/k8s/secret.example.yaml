# Example secret shape. Copy to a local file (gitignored), replace values, then apply.
# Do not commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: news-api-secrets
type: Opaque
stringData:
  gnews-api-key: REPLACE_WITH_GNEWS_KEY
  redis-url: redis://redis:6379
  client-api-keys: ""
