name: Supply chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anchore/sbom-action@v0
        with:
          path: "."
          format: spdx-json
          artifact-name: sbom-spdx-json
          upload-artifact: true
